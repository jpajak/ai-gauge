name: Bug report
description: Crash, UI glitch, refresh problem, or other unexpected behavior.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Please do not paste real cookies, GitHub PATs, or account-identifying
        log lines. Redact them as `<redacted>` if needed.
  - type: input
    id: version
    attributes:
      label: AI Gauge version
      description: Find this in the widget header or via `python -m aigauge --version` (if available).
      placeholder: "e.g. 0.5.0"
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: "e.g. Windows 11 23H2"
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: How are you running AI Gauge?
      options:
        - Standalone .exe (PyInstaller build)
        - From source (`python -m aigauge`)
        - Other (describe below)
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Settings
        2. Click ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log lines
      description: |
        Logs live at `%APPDATA%/ai-gauge/ai-gauge.log`. Paste only the relevant
        excerpt and redact any cookie/token values.
      render: text
